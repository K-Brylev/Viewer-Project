services:
  db:
    image: postgres:16
    container_name: ffxiv_db
    restart: always
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: ffxiv_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  backend:
    build:
      context: ./backend
    container_name: ffxiv_backend
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+asyncpg://test:test@db:5432/ffxiv_db
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
  frontend:
    build:
      context: ./frontend
    container_name: ffxiv_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:5173"
    environment:
      VITE_GRAPHQL_URI: http://localhost:8000/graphql
    volumes:
    - ./frontend/src:/app/src

volumes:
  postgres_data: